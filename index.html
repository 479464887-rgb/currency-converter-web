r:1px solid #30363d;border-radius:10px;padding:20px;text-align:center;margin-top:16px}.result-amount{font-size:32px;font-weight:700;color:#7ee787;font-family:monospace}.result-rate{font-size:13px;color:#8b949e;margin-top:8px}.rate-updated{font-size:11px;color:#484f58;margin-top:4px}.btn{background:#21262d;color:#c9d1d9;border:1px solid #30363d;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px}.btn:hover{background:#30363d}.btn-primary{background:#238636;border-color:#238636;color:#fff;width:100%;padding:12px;font-size:15px;border-radius:10px}.btn-primary:hover{background:#2ea043}.popular-pairs{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}.popular-pairs button{background:#21262d;color:#8b949e;border:1px solid #30363d;padding:6px 12px;border-radius:16px;cursor:pointer;font-size:12px}.popular-pairs button:hover{color:#58a6ff}.loading{text-align:center;padding:20px;color:#8b949e}</style></head><body><header><h1>💱 Currency Converter</h1><div class="lang-switch"><button class="active" onclick="setLang("zh")">中文</button><button onclick="setLang("en")">EN</button></div></header><div class="container"><div class="converter-card"><div class="amount-row"><input type="number" id="amount" value="1" min="0" step="any" oninput="convert()"><span style="font-size:14px;color:#8b949e" id="fromLabel">USD</span></div><div class="currency-row"><div class="currency-select"><span class="currency-flag" id="fromFlag">🇺🇸</span><select id="fromCurrency" onchange="convert()"></select></div><button class="swap-btn" onclick="swapCurrencies()">⇅</button><div class="currency-select"><span class="currency-flag" id="toFlag">🇨🇳</span><select id="toCurrency" onchange="convert()"></select></div></div><button class="btn btn-primary" onclick="convert()">🔄 转换</button><div class="result-box" id="resultBox"><div class="result-amount" id="resultAmount">—</div><div class="result-rate" id="resultRate"></div><div class="rate-updated" id="rateUpdated"></div></div><div class="popular-pairs"><button onclick="setPair("USD","CNY")">USD → CNY</button><button onclick="setPair("USD","EUR")">USD → EUR</button><button onclick="setPair("EUR","CNY")">EUR → CNY</button><button onclick="setPair("USD","JPY")">USD → JPY</button><button onclick="setPair("GBP","USD")">GBP → USD</button></div></div></div><script>var lang="zh",rates={};function setLang(l){lang=l;document.querySelectorAll(".lang-switch button").forEach(function(b,i){b.classList.toggle("active",(i===0&&l==="zh")||(i===1&&l==="en"))})}var currencies={USD:"🇺🇸 美元",CNY:"🇨🇳 人民币",EUR:"🇪🇺 欧元",JPY:"🇯🇵 日元",GBP:"🇬🇧 英镑",HKD:"🇭🇰 港币",KRW:"🇰🇷 韩元",AUD:"🇦🇺 澳元",CAD:"🇨🇦 加元",CHF:"🇨🇭 瑞士法郎",SGD:"🇸🇬 新加坡元",INR:"🇮🇳 印度卢比",BRL:"🇧🇷 巴西雷亚尔",RUB:"🇷🇺 俄罗斯卢布",MXN:"🇲🇽 墨西哥比索"};function initCurrencies(){var from=document.getElementById("fromCurrency");var to=document.getElementById("toCurrency");from.innerHTML="";to.innerHTML="";Object.keys(currencies).forEach(function(code){from.innerHTML+="<option value=""+code+"">"+code+" - "+currencies[code]+"</option>";to.innerHTML+="<option value=""+code+"">"+code+" - "+currencies[code]+"</option>"});from.value="USD";to.value="CNY"}async function fetchRates(){try{var resp=await fetch("https://open.er-api.com/v6/latest/USD");var data=await resp.json();rates=data.rates;rates.USD=1;document.getElementById("rateUpdated").textContent="汇率更新: "+new Date(data.time_last_update_utc).toLocaleString();convert()}catch(e){document.getElementById("rateUpdated").textContent="⚠️ 汇率获取失败";rates={USD:1,CNY:7.24,EUR:0.92,JPY:155,GBP:0.79,HKD:7.82,KRW:1350,AUD:1.53,CAD:1.36,CHF:0.89}}finally{convert()}}function convert(){var amount=parseFloat(document.getElementById("amount").value)||0;var from=document.getElementById("fromCurrency").value;var to=document.getElementById("toCurrency").value;document.getElementById("fromLabel").textContent=from;var fromFlag=currencies[from]?currencies[from].split(" ")[0]:"";var toFlag=currencies[to]?currencies[to].split(" ")[0]:"";document.getElementById("fromFlag").textContent=fromFlag;document.getElementById("toFlag").textContent=toFlag;if(Object.keys(rates).length===0){document.getElementById("resultAmount").textContent="加载中...";return}var rate;if(rates[from]&&rates[to]){var usdAmount=amount/rates[from];var result=usdAmount*rates[to];document.getElementById("resultAmount").textContent=result.toFixed(4)+" "+to;document.getElementById("resultRate").textContent="1 "+from+" = "+(rates[to]/rates[from]).toFixed(6)+" "+to}else{document.getElementById("resultAmount").textContent="—";document.getElementById("resultRate").textContent="汇率数据不可用"}}function swapCurrencies(){var from=document.getElementById("fromCurrency");var to=document.getElementById("toCurrency");var tmp=from.value;from.value=to.value;to.value=tmp;convert()}function setPair(from,to){document.getElementById("fromCurrency").value=from;document.getElementById("toCurrency").value=to;convert()}initCurrencies();fetchRates();</script></body></html>
